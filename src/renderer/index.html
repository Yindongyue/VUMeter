<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VU-Meter</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: oklch(0.1763 0.014 258.4);
        color: oklch(0.75 0 0);
        font-size: 12px;
        line-height: 1.5;
      }

      /* ── Layout panels ── */
      .panel-wrapper {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Canvas scales smoothly during drag/resize */
      .react-grid-item.resizing canvas,
      .react-grid-item.react-draggable-dragging canvas {
        will-change: transform;
      }

      /* Custom resize handle */
      .react-grid-item > .react-resizable-handle {
        width: 16px !important;
        height: 16px !important;
        opacity: 0.5;
        transition: opacity 0.15s ease;
      }
      .react-grid-item:hover > .react-resizable-handle {
        opacity: 1;
      }
      .react-grid-item > .react-resizable-handle::after {
        content: "";
        position: absolute;
        right: 4px;
        bottom: 4px;
        width: 6px;
        height: 6px;
        border-right: 2px solid oklch(1 0 0 / 0.5);
        border-bottom: 2px solid oklch(1 0 0 / 0.5);
      }

      /* Dragging — lift effect */
      .react-grid-item.react-draggable-dragging {
        box-shadow: 0 8px 32px oklch(0 0 0 / 0.3);
        z-index: 10 !important;
      }

      /* Resize placeholder */
      .react-grid-item.react-grid-placeholder {
        background: oklch(0.7 0.15 250 / 0.15) !important;
        border: 1px dashed oklch(0.7 0.15 250 / 0.4) !important;
        border-radius: 8px !important;
      }

      .drag-handle { user-select: none; }

      button, select, input {
        transition: opacity 0.25s ease, background-color 0.25s ease, border-color 0.25s ease;
      }
      button:hover, select:hover { opacity: 0.85; }
      button:active, select:active { opacity: 0.7; }
      button:focus-visible, select:focus-visible {
        outline: 2px solid oklch(0.7 0.15 250);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Polyfill for Node.js globals required by react-grid-layout
      window.process = window.process || { env: { NODE_ENV: 'development' } }
    </script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
