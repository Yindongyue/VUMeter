<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UVMeter</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; }
      /* Ensure canvas renders smoothly during grid item resize/drag */
      .react-grid-item > div { overflow: hidden; }
      .react-grid-item canvas { image-rendering: auto; }
      .react-grid-item.resizing canvas,
      .react-grid-item.react-draggable-dragging canvas { will-change: transform; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
