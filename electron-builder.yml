appId: com.uvmeter.app
productName: UVMeter
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
win:
  target: nsis
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.utilities
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  extendInfo:
    NSScreenCaptureDescription: "UVMeter needs screen recording permission to capture system audio."
    NSAudioCaptureUsageDescription: "UVMeter needs to capture system audio for visualization."
    NSMicrophoneUsageDescription: "UVMeter needs microphone access to capture audio from BlackHole device."
linux:
  target: AppImage
